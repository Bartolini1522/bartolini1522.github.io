<!DOCTYPE html>
<html>
<head>
<title>Contatti</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<link href="style1.css" rel="stylesheet" type="text/css"/>
<body style="background-color:#1ab7eb">
<style>
.dropbtn {
  background-color: #3498DB;                        //#0d9adb//
  color: white;
  padding: 16px;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

.dropbtn:hover, .dropbtn:focus {
  background-color: #2980B9;
}

.dropdown {
  position: relative;
  display: inline-block;
}

.dropdown-content {
  display: none;
  position: absolute;
  background-color: #f1f1f1;
  min-width: 160px;
  overflow: auto;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  z-index: 1;
}

.dropdown-content a {
  color: black;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
}

.dropdown a:hover {background-color: #ddd;}

.show {display: block;}
</style>
</head>
<body>
<h1> Benvenuti su delfo.top </h1>

<div class="dropdown">
  <button onclick="myFunction()" class="dropbtn">Dropdown</button>
  <div id="myDropdown" class="dropdown-content">
    <a href="index.html">Home</a>
    <a href="https://accounts.zoho.eu/signin?service_language=it&servicename=VirtualOffice&signupurl=https://www.zoho.com/it/mail/zohomail-pricing.html&serviceurl=https://mail.zoho.eu">Webmail</a>
    <a href="https://github.com/Bartolini1522/bartolini1522.github.io">Pagina Github</a>
    <a href="contatti.html">Contatti</a>
  </div>
</div>

<a href="mailto:webmaster@delfo.top">Email webmaster</a>

<script>
/* When the user clicks on the button, 
toggle between hiding and showing the dropdown content */
function myFunction() {
  document.getElementById("myDropdown").classList.toggle("show");
}

// Close the dropdown if the user clicks outside of it
window.onclick = function(event) {
  if (!event.target.matches('.dropbtn')) {
    var dropdowns = document.getElementsByClassName("dropdown-content");
    var i;
    for (i = 0; i < dropdowns.length; i++) {
      var openDropdown = dropdowns[i];
      if (openDropdown.classList.contains('show')) {
        openDropdown.classList.remove('show');
      }
    }
  }
}


</script>

</body>
</html>
